version: 2

updates:
  # ── Root workspace + catalog entries ──────────────────────────────────────
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
    groups:
      dev-root:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps-dev)"

  # ── apps/api ──────────────────────────────────────────────────────────────
  - package-ecosystem: "bun"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
    groups:
      prod-api:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-api:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # ── apps/web ──────────────────────────────────────────────────────────────
  - package-ecosystem: "bun"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
    groups:
      prod-web:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-web:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # ── packages/isbn ─────────────────────────────────────────────────────────
  - package-ecosystem: "bun"
    directory: "/packages/isbn"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
    groups:
      prod-isbn:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-isbn:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"

  # ── Docker: apps/api ──────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      docker-api:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(docker)"

  # ── Docker: apps/web ──────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      docker-web:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(docker)"
